{% extends "admin/base_site.html" %}
{% block content %}
<div class="chat-container"
  style="display: flex; height: calc(100vh - 120px); background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin: 20px;">
  <!-- Sidebar: Conversations -->
  <div class="chat-sidebar"
    style="width: 320px; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column;">
    <div
      style="padding: 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center;">
      <h2 style="margin: 0; font-size: 1.25rem;">Messages</h2>
      <button onclick="markAllRead()"
        style="background: none; border: none; color: #6366f1; cursor: pointer; font-size: 12px; font-weight: 600;">Mark
        all as read</button>
    </div>
    <div id="conversation-list" style="flex: 1; overflow-y: auto;">
      <!-- Conversations will be loaded here -->
    </div>
  </div>

  <!-- Active Chat Area -->
  <div class="chat-main" style="flex: 1; display: flex; flex-direction: column; background: #f9fafb;">
    <div id="chat-header"
      style="padding: 16px 20px; background: white; border-bottom: 1px solid #e5e7eb; display: none;">
      <div style="display: flex; align-items: center;">
        <div id="header-avatar"
          style="width: 40px; height: 40px; border-radius: 50%; background: #e5e7eb; margin-right: 12px;"></div>
        <div>
          <div id="header-name" style="font-weight: 600; color: #111827;">Select a conversation</div>
          <div id="header-status" style="font-size: 12px; color: #10b981;">Online</div>
        </div>
      </div>
    </div>

    <div id="messages-window"
      style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;">
      <div id="chat-placeholder" style="margin: auto; text-align: center; color: #9ca3af;">
        <svg style="width: 64px; height: 64px; margin-bottom: 16px;" fill="none" stroke="currentColor"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z">
          </path>
        </svg>
        <p>Welcome to Web Chat. Select a contact to start messaging.</p>
      </div>
    </div>

    <div id="input-area" style="padding: 20px; background: white; border-top: 1px solid #e5e7eb; display: none;">
      <div style="display: flex; gap: 12px;">
        <input type="text" id="message-input" placeholder="Type a message..."
          style="flex: 1; padding: 12px 16px; border: 1px solid #e5e7eb; border-radius: 9999px; outline: none;">
        <button id="send-btn"
          style="background: #6366f1; color: white; border: none; padding: 10px 24px; border-radius: 9999px; cursor: pointer; font-weight: 600;">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
  let activeConversation = null;
  let socket = null;
  const currentUserId = parseInt("{{ request.user.id }}");

  document.addEventListener('DOMContentLoaded', () => {
    loadConversations();

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('message-input').onkeypress = (e) => {
      if (e.key === 'Enter') sendMessage();
    };
  });

  async function loadConversations() {
    const res = await fetch('/api/conversations/');
    const data = await res.json();
    const list = document.getElementById('conversation-list');
    list.innerHTML = data.map(conv => {
      const partner = conv.participants.find(p => p.id !== currentUserId) || conv.participants[0];
      return `
                <div onclick="selectConversation(${conv.id}, '${partner.username}')" class="conv-item" style="padding: 16px 20px; border-bottom: 1px solid #f3f4f6; cursor: pointer; transition: 0.2s;">
                    <div style="display: flex; align-items: center;">
                        <div style="width: 48px; height: 48px; border-radius: 12px; background: #6366f1; margin-right: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">
                            ${partner.username[0].toUpperCase()}
                        </div>
                        <div style="flex: 1;">
                            <div style="display: flex; justify-content: space-between;">
                                <span style="font-weight: 600; color: #111827;">${partner.username}</span>
                                <span style="font-size: 11px; color: #9ca3af;">${conv.latest_message ? new Date(conv.latest_message.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : ''}</span>
                            </div>
                            <div style="font-size: 13px; color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px;">
                                ${conv.latest_message ? conv.latest_message.text : 'Start a conversation'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
    }).join('');
  }

  async function selectConversation(id, name) {
    if (socket) socket.close();
    activeConversation = id;

    // UI Updates
    document.getElementById('chat-placeholder').style.display = 'none';
    document.getElementById('chat-header').style.display = 'block';
    document.getElementById('input-area').style.display = 'block';
    document.getElementById('header-name').innerText = name;
    document.getElementById('messages-window').innerHTML = '';

    // Load Messages
    const res = await fetch(`/api/messages/?conversation=${id}`);
    const messages = await res.json();
    messages.forEach(appendMessage);
    scrollToBottom();

    // WebSocket
    const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
    socket = new WebSocket(`${protocol}://${window.location.host}/ws/chat/${id}/`);

    socket.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'message') {
        appendMessage(data.message);
        scrollToBottom();
      }
    };
  }

  function sendMessage() {
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    if (!text || !socket) return;

    socket.send(JSON.stringify({
      'type': 'message',
      'message': text
    }));
    input.value = '';
  }

  function appendMessage(msg) {
    const isMe = msg.sender.id === currentUserId;
    const msgHtml = `
            <div style="display: flex; ${isMe ? 'justify-content: flex-end' : 'justify-content: flex-start'};">
                <div style="max-width: 70%; padding: 10px 16px; border-radius: 18px; ${isMe ? 'background: #6366f1; color: white' : 'background: #e5e7eb; color: #111827'}; font-size: 14px; position: relative;">
                    ${msg.text}
                    <div style="font-size: 10px; opacity: 0.7; margin-top: 4px; text-align: right;">${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                </div>
            </div>
        `;
    document.getElementById('messages-window').insertAdjacentHTML('beforeend', msgHtml);
  }

  function scrollToBottom() {
    const win = document.getElementById('messages-window');
    win.scrollTop = win.scrollHeight;
  }

  async function markAllRead() {
    if (!activeConversation) return;
    await fetch(`/api/conversations/${activeConversation}/mark_all_as_read/`, {
      method: 'POST',
      headers: { 'X-CSRFToken': '{{ csrf_token }}' }
    });
    alert('Conversation marked as read');
  }
</script>

<style>
  .conv-item:hover {
    background: #f9fafb !important;
  }

  #conversation-list::-webkit-scrollbar {
    width: 4px;
  }

  #conversation-list::-webkit-scrollbar-thumb {
    background: #e5e7eb;
    border-radius: 10px;
  }

  #messages-window::-webkit-scrollbar {
    width: 6px;
  }

  #messages-window::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.1);
    border-radius: 10px;
  }
</style>
{% endblock %}
