{% extends "admin/base_site.html" %}
{% block content %}
<div class="saved-searches-wrapper" style="padding: 20px; font-family: 'Inter', sans-serif;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h1 style="margin: 0;">My Saved Searches</h1>
  </div>

  <div id="searches-grid"
    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
    <!-- Loading -->
    <div style="padding: 40px; text-align: center; color: #9ca3af; grid-column: 1/-1;">Loading your searches...</div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', loadSearches);

  async function loadSearches() {
    const res = await fetch('/api/saved-searches/');
    const data = await res.json();
    const grid = document.getElementById('searches-grid');

    if (data.length === 0) {
      grid.innerHTML = '<div style="padding:40px; text-align:center; color:#9ca3af; grid-column:1/-1;">You haven\'t saved any searches yet.</div>';
      return;
    }

    grid.innerHTML = data.map(search => `
            <div class="card" style="background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e5e7eb;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                    <div style="font-weight: 700; color: #111827; font-size: 1.1rem;">${search.query || 'All Marketplace'}</div>
                    <div style="font-size: 11px; padding: 4px 8px; background: #f3f4f6; border-radius: 9999px; text-transform: uppercase; color: #6b7280;">${search.frequency}</div>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <p style="font-size: 13px; color: #6b7280; margin: 0;">Filters: ${JSON.stringify(search.filters)}</p>
                    <p style="font-size: 11px; color: #9ca3af; margin-top: 4px;">Created ${new Date(search.created_at).toLocaleDateString()}</p>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f3f4f6; padding-top: 16px;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="font-size: 13px; color: #374151;">Email Alerts</span>
                        <input type="checkbox" onchange="toggleAlerts(${search.id})" ${search.alerts_enabled ? 'checked' : ''} style="cursor: pointer; width: 16px; height: 16px;">
                    </div>
                    <a href="/api/listings/?search=${search.query || ''}" class="btn" style="color: #6366f1; text-decoration: none; font-weight: 600; font-size: 14px;">Run Search →</a>
                </div>
            </div>
        `).join('');
  }

  async function toggleAlerts(id) {
    await fetch(`/api/saved-searches/${id}/toggle_alerts/`, {
      method: 'POST',
      headers: { 'X-CSRFToken': '{{ csrf_token }}' }
    });
  }
</script>
{% endblock %}
